name: CI Pipeline

on:
  push:
    branches:
      - main
      - develop
      - feature/**
  pull_request:
    branches:
      - main
      - develop

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v4

      - name: Configurar Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Crear carpeta de salida
        run: mkdir -p out

      - name: Compilar clases fuente
        run: javac -d out src/*.java

      - name: Compilar pruebas
        run: javac -cp "out:lib/junit-4.13.2.jar:lib/hamcrest-core-1.3.jar" -d out test/*.java

      - name: Ejecutar pruebas JUnit
        run: java -cp "out:lib/junit-4.13.2.jar:lib/hamcrest-core-1.3.jar" org.junit.runner.JUnitCore TestVaso TestCafetera TestAzucarero TestMaquinaDeCafe
